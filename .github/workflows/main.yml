name: Extract Partition Images

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: 'رابط مباشر لروم HyperOS Fastboot (.tgz)'
        required: true
      file_to_extract:
        description: 'اختر الملف الذي تريد استخراجه'
        required: true
        type: choice
        options:
          - vendor_boot
          - boot
          - recovery

jobs:
  extract_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download and Extract
        run: |
          # تحديد اسم الملف المطلوب
          TARGET_FILE="${{ github.event.inputs.file_to_extract }}.img"
          echo "Target file: $TARGET_FILE"

          # تحميل الروم باستخدام curl مع دعم الروابط التي يعاد توجيهها
          echo "Downloading ROM..."
          curl -L "${{ github.event.inputs.rom_url }}" -o rom.tgz
          
          # البحث عن المسار الفعلي للملف داخل الأرشيف (يتجنب مشاكل اختلاف المجلدات)
          FILE_PATH=$(tar -tf rom.tgz | grep -E "/${TARGET_FILE}$|^${TARGET_FILE}$" | head -n 1)
          
          if [ -z "$FILE_PATH" ]; then
            echo "خطأ: الملف $TARGET_FILE غير موجود في هذه الروم!"
            exit 1
          fi
          
          echo "تم العثور على الملف في: $FILE_PATH"
          
          # استخراج الملف وتجريده من مسار المجلدات
          tar -xvf rom.tgz "$FILE_PATH" --strip-components=$(echo $FILE_PATH | tr -cd '/' | wc -c)
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.file_to_extract }}_image
          path: "*.img"
